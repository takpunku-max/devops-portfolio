name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: devops-portfolio-backend
          IMAGE_TAG: ${{ github.sha }}-${{ github.run_number }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Lambda function
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: devops-portfolio-backend
          IMAGE_TAG: ${{ github.sha }}-${{ github.run_number }}
        run: |
          aws lambda update-function-code \
            --function-name devops-portfolio-backend \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Verify deployment
        run: |
          echo "Waiting for Lambda to finish updating..."
          aws lambda wait function-updated \
            --function-name devops-portfolio-backend
          
          echo "Checking health endpoint..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://b7ltc8wle4.execute-api.us-east-1.amazonaws.com/health)
          
          if [ "$RESPONSE" = "200" ]; then
            echo "✓ Health check passed — deployment successful"
          else
            echo "✗ Health check failed — got HTTP $RESPONSE"
            exit 1
          fi

          