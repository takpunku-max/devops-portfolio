name: Lint

on: 
    push:
        branches: [main]
    pull_request:
        branches: [main]


jobs:
    lint-backend:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.12'

        - name: Install ruff
          run: pip install ruff

        - name: Lint backend
          run: ruff check backend/

    lint-frontend:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - name: Setup Node
          uses: actions/setup-node@v4
          with:
            node-version: '24'

        - name: Install dependencies
          run: npm ci
          working-directory: frontend

        - name: Lint frontend
          run: npm run lint
          working-directory: frontend

